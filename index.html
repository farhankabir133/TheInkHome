<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Ink Home | Volumetric Digital Publication</title>
    <script>
      function reportLog(type, data) {
        fetch('/api/log-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: type, data: data })
        }).catch(function() {});
      }

      function serializeArgs(args) {
        return Array.from(args).map(function(arg) {
          if (arg instanceof Error) {
            return { message: arg.message, stack: arg.stack };
          }
          if (typeof arg === 'object') {
            try { return JSON.stringify(arg); } catch (e) { return String(arg); }
          }
          return String(arg);
        });
      }

      // Intercept all console methods
      const _log = console.log;
      console.log = function() {
        _log.apply(console, arguments);
        reportLog('console-log', serializeArgs(arguments));
      };

      const _warn = console.warn;
      console.warn = function() {
        _warn.apply(console, arguments);
        reportLog('console-warn', serializeArgs(arguments));
      };

      const _error = console.error;
      console.error = function() {
        _error.apply(console, arguments);
        reportLog('console-error', serializeArgs(arguments));
      };

      window.addEventListener('error', function(event) {
        reportLog('uncaught-error', {
          message: event.message,
          filename: event.filename,
          lineno: event.lineno,
          colno: event.colno,
          stack: event.error ? event.error.stack : 'No stack trace available'
        });

        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="color: #ff3333; padding: 30px; font-family: monospace; background: #080808; min-height: 100vh; line-height: 1.5;">' +
            '<h1 style="font-size: 24px; margin-bottom: 20px; border-bottom: 1px solid #ff3333; padding-bottom: 10px;">Runtime Error Caught</h1>' +
            '<p><strong>Message:</strong> ' + event.message + '</p>' +
            '<p><strong>Source:</strong> ' + event.filename + ':' + event.lineno + ':' + event.colno + '</p>' +
            '<pre style="white-space: pre-wrap; background: #111; padding: 15px; border-radius: 4px; border: 1px solid #333; margin-top: 15px;">' + (event.error ? event.error.stack : 'No stack trace available') + '</pre>' +
            '</div>';
        }
      });

      window.addEventListener('unhandledrejection', function(event) {
        reportLog('unhandled-rejection', {
          reason: String(event.reason),
          stack: event.reason && event.reason.stack ? event.reason.stack : 'No stack trace available'
        });

        const root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="color: #ff9900; padding: 30px; font-family: monospace; background: #080808; min-height: 100vh; line-height: 1.5;">' +
            '<h1 style="font-size: 24px; margin-bottom: 20px; border-bottom: 1px solid #ff9900; padding-bottom: 10px;">Unhandled Promise Rejection</h1>' +
            '<p><strong>Reason:</strong> ' + String(event.reason) + '</p>' +
            '<pre style="white-space: pre-wrap; background: #111; padding: 15px; border-radius: 4px; border: 1px solid #333; margin-top: 15px;">' + (event.reason && event.reason.stack ? event.reason.stack : 'No stack trace available') + '</pre>' +
            '</div>';
        }
      });
    </script>
    <script type="module" crossorigin src="/assets/index-DI8zCpfR.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-C8zbBJ-X.css">
  </head>
  <body>
    <div style="color: white; background: red; padding: 20px; font-weight: bold; position: fixed; top: 0; left: 0; z-index: 9999;" id="debug-banner">
      If you can see this, index.html loaded!
    </div>
    <div id="root"></div>
  </body>
</html>
