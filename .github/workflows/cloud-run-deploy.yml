name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
      - name: Build and push Docker image
        run: |
          IMAGE=gcr.io/${{ secrets.GCP_PROJECT }}/the-ink-home
          docker build -t $IMAGE .
          docker push $IMAGE
      - name: Deploy to Cloud Run
        run: |
          IMAGE=gcr.io/${{ secrets.GCP_PROJECT }}/the-ink-home
          gcloud run deploy the-ink-home --image $IMAGE --region us-central1 --platform managed --allow-unauthenticated --project ${{ secrets.GCP_PROJECT }}

      - name: Capture Cloud Run URL
        id: get-url
        run: |
          SERVICE=the-ink-home
          URL=$(gcloud run services describe $SERVICE --project=${{ secrets.GCP_PROJECT }} --region=us-central1 --format='value(status.url)')
          echo "Service URL: $URL"
          echo "SERVICE_URL=$URL" >> $GITHUB_OUTPUT

      - name: Persist Cloud Run URL to file
        if: ${{ steps.get-url.outputs.SERVICE_URL != '' }}
        run: |
          echo "${{ steps.get-url.outputs.SERVICE_URL }}" > service-url.txt

      - name: Upload Cloud Run URL artifact
        if: ${{ steps.get-url.outputs.SERVICE_URL != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: cloud-run-url
          path: service-url.txt

      - name: Rebuild client with VITE_API_BASE and VITE_BASE=/ then publish gh-pages
        env:
          VITE_API_BASE: ${{ steps.get-url.outputs.SERVICE_URL }}
          VITE_BASE: /
          NODE_OPTIONS: "--max-old-space-size=2048"
        run: |
          # Install deps and build client with VITE_API_BASE and VITE_BASE embedded
          npm ci
          # Build will pick up VITE_API_BASE and VITE_BASE from env (import.meta.env / process.env)
          npm run build
          # Publish dist to gh-pages
          npx gh-pages -d dist
