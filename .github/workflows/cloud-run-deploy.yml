name: CI — lint, test, build & publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  ci-build-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint / typecheck
        run: npm run lint

      - name: Run unit tests
        run: npm test -- --run

      - name: Build production bundle
        env:
          NODE_OPTIONS: "--max-old-space-size=2048"
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_BASE: ${{ secrets.VITE_BASE }}
        run: npm run build

      - name: Publish dist to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: false
